<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="40" y="60" width="280" height="80" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="110" text-anchor="middle" fill="#dbeafe" font-size="26" font-weight="bold">ファイルを編集</text>

  <rect x="380" y="60" width="280" height="80" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="520" y="100" text-anchor="middle" fill="#dbeafe" font-size="24" font-weight="bold">git add</text>
  <text x="520" y="128" text-anchor="middle" fill="#93c5fd" font-size="18">（選ぶ）</text>

  <rect x="720" y="60" width="280" height="80" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="860" y="100" text-anchor="middle" fill="#dbeafe" font-size="24" font-weight="bold">git commit</text>
  <text x="860" y="128" text-anchor="middle" fill="#93c5fd" font-size="18">（記録する）</text>

  <rect x="1060" y="60" width="280" height="80" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="1200" y="100" text-anchor="middle" fill="#a7f3d0" font-size="24" font-weight="bold">git push</text>
  <text x="1200" y="128" text-anchor="middle" fill="#a7f3d0" font-size="18">（共有する）</text>

  <line x1="322" y1="100" x2="378" y2="100" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <line x1="662" y1="100" x2="718" y2="100" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <line x1="1002" y1="100" x2="1058" y2="100" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)"/>
</svg>
