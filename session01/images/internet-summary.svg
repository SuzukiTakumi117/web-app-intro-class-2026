  <text x="920" y="70" text-anchor="middle" fill="#93c5fd" font-size="14">（例: google.com）</text>

  <line x1="180" y1="80" x2="180" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
