  <line x1="920" y1="80" x2="920" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <rect x="60" y="460" width="240" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="180" y="498" text-anchor="middle" fill="#dbeafe" font-size="24" font-weight="bold">あなたのPC</text>

  <rect x="430" y="460" width="240" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="550" y="498" text-anchor="middle" fill="#dbeafe" font-size="24" font-weight="bold">DNSサーバー</text>

  <rect x="800" y="460" width="240" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="920" y="488" text-anchor="middle" fill="#dbeafe" font-size="22" font-weight="bold">Webサーバー</text>
