<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 360" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="40" y="100" width="260" height="160" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="158" text-anchor="middle" fill="#dbeafe" font-size="22" font-weight="bold">元のデータ</text>
  <text x="170" y="208" text-anchor="middle" fill="#dbeafe" font-size="22" font-family="monospace">ABCDEFGHIJKLMNOP</text>

  <rect x="400" y="60" width="260" height="240" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="530" y="108" text-anchor="middle" fill="#cffafe" font-size="20" font-family="monospace">パケット1: ABCD</text>
  <text x="530" y="166" text-anchor="middle" fill="#cffafe" font-size="20" font-family="monospace">パケット2: EFGH</text>
  <text x="530" y="224" text-anchor="middle" fill="#cffafe" font-size="20" font-family="monospace">パケット3: IJKL</text>
  <text x="530" y="282" text-anchor="middle" fill="#cffafe" font-size="20" font-family="monospace">パケット4: MNOP</text>

  <rect x="760" y="100" width="260" height="160" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="890" y="190" text-anchor="middle" fill="#dbeafe" font-size="26" font-weight="bold">受信側</text>

  <rect x="1120" y="100" width="260" height="160" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="1250" y="160" text-anchor="middle" fill="#a7f3d0" font-size="22" font-weight="bold">組み立て後</text>
  <text x="1250" y="210" text-anchor="middle" fill="#a7f3d0" font-size="22" font-family="monospace">ABCDEFGHIJKLMNOP</text>

  <line x1="302" y1="180" x2="398" y2="180" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="350" y="166" text-anchor="middle" fill="#93c5fd" font-size="20">分割</text>

  <line x1="662" y1="180" x2="758" y2="180" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="710" y="166" text-anchor="middle" fill="#93c5fd" font-size="20">送信</text>

  <line x1="1022" y1="180" x2="1118" y2="180" stroke="#60a5fa" stroke-width="3" marker-end="url(#arrow-blue)"/>
  <text x="1070" y="166" text-anchor="middle" fill="#93c5fd" font-size="20">組立</text>
</svg>
