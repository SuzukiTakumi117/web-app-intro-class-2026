<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="10" y="20" width="540" height="420" rx="12" fill="#1e3a8a" fill-opacity="0.18" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="280" y="56" text-anchor="middle" fill="#93c5fd" font-size="20" font-weight="bold">ブラウザ（クライアント）</text>

  <rect x="40" y="90" width="480" height="80" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="138" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">防御1: XSS対策（textContent使用）</text>

  <rect x="40" y="200" width="480" height="80" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="248" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">防御2: 入力バリデーション（空文字等）</text>

  <rect x="40" y="310" width="480" height="80" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="280" y="358" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">防御3: エラーハンドリング</text>

  <rect x="730" y="20" width="540" height="420" rx="12" fill="#155e75" fill-opacity="0.18" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="1000" y="56" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー（Python / FastAPI）</text>

  <rect x="760" y="80" width="480" height="60" rx="8" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1000" y="118" text-anchor="middle" fill="#cffafe" font-size="17" font-weight="bold">防御4: バリデーション（Pydantic）</text>

  <rect x="760" y="160" width="480" height="60" rx="8" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1000" y="198" text-anchor="middle" fill="#cffafe" font-size="17" font-weight="bold">防御5: SQLインジェクション対策</text>

  <rect x="760" y="240" width="480" height="60" rx="8" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1000" y="278" text-anchor="middle" fill="#cffafe" font-size="17" font-weight="bold">防御6: エラーハンドリング（HTTPステータス）</text>

  <rect x="760" y="320" width="480" height="60" rx="8" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="1000" y="358" text-anchor="middle" fill="#cffafe" font-size="17" font-weight="bold">防御7: HTTPS（通信の暗号化）</text>

  <line x1="555" y1="230" x2="725" y2="230" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="640" y="218" text-anchor="middle" fill="#93c5fd" font-size="16" font-weight="bold">HTTP通信</text>
</svg>
