<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 480" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
  </defs>

  <rect x="60" y="20" width="200" height="60" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="58" text-anchor="middle" fill="#fecaca" font-size="20" font-weight="bold">攻撃者</text>

  <rect x="540" y="20" width="200" height="60" rx="6" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="640" y="58" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー</text>

  <rect x="1020" y="20" width="200" height="60" rx="6" fill="#78350f" stroke="#d97706" stroke-width="2"/>
  <text x="1120" y="58" text-anchor="middle" fill="#fde68a" font-size="20" font-weight="bold">データベース</text>

  <line x1="160" y1="80" x2="160" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="640" y1="80" x2="640" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1120" y1="80" x2="1120" y2="460" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="160" y1="120" x2="638" y2="120" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="400" y="108" text-anchor="middle" fill="#fecaca" font-size="18" font-weight="bold">1. 不正な入力を送信</text>

  <rect x="440" y="150" width="400" height="80" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="640" y="180" text-anchor="middle" fill="#451a03" font-size="15" font-weight="bold">2. 入力を直接SQL文に埋め込む</text>
  <text x="640" y="208" text-anchor="middle" fill="#451a03" font-size="15" font-weight="bold">SQL文に DROP TABLE が混入</text>

  <line x1="640" y1="280" x2="1118" y2="280" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="880" y="268" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="bold">組み立てられたSQL文を実行</text>

  <rect x="980" y="310" width="280" height="80" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="1120" y="358" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="bold">3. テーブルが削除される！</text>
</svg>
