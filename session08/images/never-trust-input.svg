<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 460" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-emerald" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#34d399"/>
    </marker>
  </defs>

  <rect x="20" y="180" width="220" height="100" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="232" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">ユーザーの入力</text>

  <line x1="245" y1="230" x2="335" y2="230" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="340" y="180" width="320" height="100" rx="10" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="500" y="218" text-anchor="middle" fill="#fecaca" font-size="18" font-weight="bold">入力値は必ず</text>
  <text x="500" y="250" text-anchor="middle" fill="#fecaca" font-size="18" font-weight="bold">「悪意がある」前提で扱う</text>

  <rect x="740" y="20" width="320" height="100" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="900" y="58" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">フロントエンド（JS）</text>
  <text x="900" y="86" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">での防御</text>

  <rect x="740" y="180" width="320" height="100" rx="10" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="900" y="218" text-anchor="middle" fill="#cffafe" font-size="18" font-weight="bold">バックエンド（Python）</text>
  <text x="900" y="246" text-anchor="middle" fill="#cffafe" font-size="18" font-weight="bold">での防御</text>

  <rect x="740" y="340" width="320" height="100" rx="10" fill="#78350f" stroke="#d97706" stroke-width="2"/>
  <text x="900" y="378" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="bold">データベース</text>
  <text x="900" y="406" text-anchor="middle" fill="#fde68a" font-size="18" font-weight="bold">での防御</text>

  <line x1="660" y1="220" x2="738" y2="80" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="660" y1="230" x2="738" y2="230" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <line x1="660" y1="240" x2="738" y2="380" stroke="#60a5fa" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <rect x="1130" y="180" width="140" height="100" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
  <text x="1200" y="218" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold">安全に</text>
  <text x="1200" y="246" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold">処理された</text>
  <text x="1200" y="270" text-anchor="middle" fill="#a7f3d0" font-size="18" font-weight="bold">データ</text>

  <line x1="1062" y1="80" x2="1128" y2="220" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <line x1="1062" y1="230" x2="1128" y2="230" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
  <line x1="1062" y1="380" x2="1128" y2="240" stroke="#34d399" stroke-width="2" marker-end="url(#arrow-emerald)"/>
</svg>
