<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 580" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f87171"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="60" y="20" width="200" height="60" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="160" y="58" text-anchor="middle" fill="#fecaca" font-size="20" font-weight="bold">攻撃者</text>

  <rect x="540" y="20" width="200" height="60" rx="6" fill="#155e75" stroke="#06b6d4" stroke-width="2"/>
  <text x="640" y="58" text-anchor="middle" fill="#cffafe" font-size="20" font-weight="bold">サーバー</text>

  <rect x="1020" y="20" width="200" height="60" rx="6" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="1120" y="58" text-anchor="middle" fill="#dbeafe" font-size="20" font-weight="bold">被害者</text>

  <line x1="160" y1="80" x2="160" y2="560" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="640" y1="80" x2="640" y2="560" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>
  <line x1="1120" y1="80" x2="1120" y2="560" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

  <line x1="160" y1="120" x2="638" y2="120" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="400" y="108" text-anchor="middle" fill="#fecaca" font-size="18" font-weight="bold">1. 悪意ある入力を送信</text>

  <rect x="500" y="150" width="280" height="60" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="640" y="188" text-anchor="middle" fill="#451a03" font-size="16" font-weight="bold">2. そのまま保存</text>

  <line x1="1120" y1="260" x2="642" y2="260" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="880" y="248" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">ページを閲覧</text>

  <line x1="640" y1="320" x2="1118" y2="320" stroke="#f87171" stroke-width="2.5" marker-end="url(#arrow-red)"/>
  <text x="880" y="308" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="bold">3. ページを表示（悪意あるスクリプトがHTMLに含まれる）</text>

  <rect x="940" y="350" width="320" height="180" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="1100" y="382" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="bold">4. スクリプトが実行される！</text>
  <text x="1100" y="420" text-anchor="middle" fill="#fecaca" font-size="16">→ Cookie盗難</text>
  <text x="1100" y="452" text-anchor="middle" fill="#fecaca" font-size="16">→ 画面改ざん</text>
  <text x="1100" y="484" text-anchor="middle" fill="#fecaca" font-size="16">→ 偽フォーム表示</text>
</svg>
