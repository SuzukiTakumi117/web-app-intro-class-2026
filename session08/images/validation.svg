<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" font-family="'Hiragino Sans', 'Yu Gothic', 'Meiryo', 'Noto Sans CJK JP', sans-serif">
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#60a5fa"/>
    </marker>
  </defs>

  <rect x="20" y="140" width="170" height="100" rx="10" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="105" y="186" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">ユーザー</text>
  <text x="105" y="212" text-anchor="middle" fill="#dbeafe" font-size="18" font-weight="bold">入力</text>

  <line x1="195" y1="190" x2="240" y2="190" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <rect x="245" y="40" width="450" height="300" rx="12" fill="#1e3a8a" fill-opacity="0.18" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="470" y="76" text-anchor="middle" fill="#93c5fd" font-size="18" font-weight="bold">クライアント側バリデーション（JavaScript）</text>

  <rect x="270" y="100" width="400" height="60" rx="8" fill="#1e3a8a" stroke="#3b82f6" stroke-width="2"/>
  <text x="470" y="138" text-anchor="middle" fill="#dbeafe" font-size="16" font-weight="bold">UXのため（即座にフィードバック）</text>

  <rect x="270" y="170" width="400" height="60" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="470" y="208" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="bold">開発者ツールで回避可能！</text>

  <rect x="270" y="240" width="400" height="60" rx="8" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="470" y="278" text-anchor="middle" fill="#fecaca" font-size="16" font-weight="bold">信頼してはいけない</text>

  <line x1="700" y1="190" x2="745" y2="190" stroke="#60a5fa" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <text x="722" y="178" text-anchor="middle" fill="#93c5fd" font-size="14" font-weight="bold">HTTP</text>

  <rect x="750" y="40" width="450" height="300" rx="12" fill="#155e75" fill-opacity="0.18" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="975" y="76" text-anchor="middle" fill="#cffafe" font-size="18" font-weight="bold">サーバー側バリデーション（Pydantic）</text>

