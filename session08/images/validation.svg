  <text x="975" y="138" text-anchor="middle" fill="#a7f3d0" font-size="16" font-weight="bold">最終防御ライン</text>

  <rect x="775" y="170" width="400" height="60" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="2"/>
